<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 90" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=VT323&amp;display=swap');
      
      .bg { fill: #080c16; }
      
      /* 액자 테두리 (Inset 그림자처럼 보이게) */
      .borderOuter { stroke: #2a3441; stroke-width: 6; fill: none; }
      .borderInner { stroke: #0b0d14; stroke-width: 4; fill: none; }

      .title { 
        font-family: 'VT323', monospace; 
        fill: #5cf; 
        font-size: 28px; 
        text-anchor: middle; 
        dominant-baseline: central;
      }
      
      .subtitle { 
        font-family: 'VT323', monospace; 
        fill: #89a; 
        font-size: 16px; 
        text-anchor: middle; 
        dominant-baseline: central;
      }

      /* 깜빡이는 커서 및 타이틀 효과 */
      .blink { animation: blinker 1.2s step-end infinite; }
      
      @keyframes blinker {
        50% { opacity: 0; }
      }

      /* CRT 스캔라인 느낌 */
      .scanline { fill: url(#scanlines); pointer-events: none; opacity: 0.15; }
      
      /* 호버를 기대할 수 없으므로 무한 루프 플로팅 애니메이션 추가 */
      .float { animation: floating 4s ease-in-out infinite; }
      @keyframes floating {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
    </style>
    
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000"/>
      <rect y="2" width="4" height="2" fill="transparent"/>
    </pattern>

    <!-- 약간의 네온 번짐(Glow) 효과 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect class="bg" width="100%" height="100%" rx="6" />
  
  <g class="float">
    <!-- 텍스트 타이틀 -->
    <text x="50%" y="40" class="title" filter="url(#glow)">
      [ ENTER THE BUILDER'S TALE ]<tspan class="blink" dx="3">_</tspan>
    </text>
    <!-- 서브텍스트 -->
    <text x="50%" y="65" class="subtitle">
      ▶ Click to start the interactive 90s adventure ◀
    </text>
  </g>

  <!-- 전면 스캔라인 오버레이 덮기 -->
  <rect class="scanline" width="100%" height="100%" rx="6" />
  
  <!-- 데코레이션 테두리 -->
  <rect class="borderOuter" x="3" y="3" width="394" height="84" rx="4" />
  <rect class="borderInner" x="6" y="6" width="388" height="78" rx="2" />
</svg>
