<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>The Builder's Tale</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    body {
      margin: 0;
      padding: 0;
      background-color: #030405;
      /* 더 깊고 무거운 밤 배경 */
      color: #fff;
      font-family: 'VT323', monospace;
      font-size: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      user-select: none;
    }

    #lang-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #111;
      border: 2px solid #5cf;
      padding: 5px 10px;
      cursor: pointer;
      color: #5cf;
      z-index: 100;
      transition: all 0.2s;
    }

    #lang-toggle:hover {
      background: #5cf;
      color: #000;
      box-shadow: 0 0 10px #5cf;
    }

    #game-container {
      width: 100%;
      max-width: 800px;
      margin-top: 50px;
      border: 4px solid #445;
      background: #000;
      display: flex;
      flex-direction: column;
      position: relative;
      /* 90년대 CRT 테두리 음영(Vignette) */
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(100, 100, 150, 0.1);
    }

    #viewport {
      width: 100%;
      height: 360px;
      background: #000;
      position: relative;
      border-bottom: 4px solid #445;
      overflow: hidden;
    }

    /* 📺 CRT 스캔라인 오버레이 (인디아나 존스/루카스아츠 VGA 느낌 극대화) */
    #viewport::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
      z-index: 5;
      background-size: 100% 4px, 6px 100%;
      pointer-events: none;
    }

    canvas#scene {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    canvas#pong {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 20, 0, 0.95);
      z-index: 10;
    }

    #pong-msg {
      display: none;
      position: absolute;
      top: 50%;
      width: 100%;
      text-align: center;
      color: #fff;
      z-index: 11;
      font-size: 28px;
      text-shadow: 2px 2px #f00;
      transform: translateY(-50%);
      pointer-events: none;
    }

    #action-panel {
      display: flex;
      flex-direction: row;
      height: 260px;
      background: #0b0d14;
    }

    #verbs {
      width: 30%;
      padding: 15px;
      border-right: 4px solid #445;
      display: flex;
      flex-direction: column;
      gap: 15px;
      box-sizing: border-box;
    }

    .verb {
      color: #678;
      cursor: pointer;
      text-align: center;
      transition: color 0.1s;
    }

    .verb:hover,
    .verb.active {
      color: #fff;
      text-decoration: underline;
      text-shadow: 0 0 5px #fff;
    }

    #dialogue {
      width: 70%;
      padding: 20px;
      box-sizing: border-box;
      color: #5cf;
      line-height: 1.4;
      overflow-y: auto;
      text-shadow: 0 0 2px rgba(85, 204, 255, 0.5);
    }

    .text-title {
      color: #fff;
      display: block;
      margin-bottom: 12px;
      font-size: 28px;
      border-bottom: 2px dashed #445;
      padding-bottom: 5px;
    }

    .text-item {
      margin-bottom: 10px;
      display: block;
      line-height: 1.2;
    }

    .text-link {
      color: #f55;
      text-decoration: none;
      border-bottom: 1px dotted #f55;
      cursor: pointer;
      text-shadow: 0 0 3px rgba(255, 85, 85, 0.4);
    }

    .text-link:hover {
      color: #fff;
      border-bottom: 1px solid #fff;
    }

    .text-highlight {
      color: #fe0;
      text-shadow: 0 0 3px #fe0;
    }

    .cursor {
      display: inline-block;
      width: 12px;
      height: 20px;
      background: #5cf;
      vertical-align: bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .title-banner {
      margin-top: 30px;
      font-size: 32px;
      letter-spacing: 2px;
      text-align: center;
      color: #fff;
      text-shadow: 0 0 10px #5cf;
    }

    .subtitle {
      font-size: 18px;
      color: #aaa;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <div id="lang-toggle">LANG: EN</div>
  <div class="title-banner" id="mainTitle">The Builder's Tale</div>
  <div class="subtitle" id="subTitle">"Ordinary lines of code form extraordinary worlds."</div>

  <div id="game-container">
    <div id="viewport">
      <canvas id="scene" width="320" height="144"></canvas>
      <canvas id="pong" width="320" height="144"></canvas>
      <div id="pong-msg" id="pongMsgDisplay">PRESS SPACE TO SERVE<br><span style="font-size:16px;">(Arrow Keys to move,
          Q to quit)</span></div>
    </div>
    <div id="action-panel">
      <div id="verbs">
        <!-- 원본 스토리 버튼으로 복구 -->
        <div class="verb active" data-action="intro" id="btn-intro">Look at Man</div>
        <div class="verb" data-action="examine" id="btn-examine">Examine Desk</div>
        <div class="verb" data-action="open" id="btn-open">Open Drawer</div>
        <div class="verb" data-action="play" id="btn-play" style="color:#233;">Play</div>
      </div>
      <div id="dialogue">
        <span id="text-content"></span><span class="cursor" id="cursor"></span>
      </div>
    </div>
  </div>

  <script>
    // -----------------------------------------------------
    // 1. 다국어 데이터 (i18n): 기존 "방 안의 개발자" 평범함의 스토리로 롤백
    // -----------------------------------------------------
    const i18n = {
      en: {
        title: "The Builder's Tale",
        subTitle: '"Ordinary lines of code form extraordinary worlds."',
        btnIntro: "Look at (Intro)",
        btnExamine: "Examine (Public)",
        btnOpen: "Open (Private)",
        btnPlay: "Play",
        pongMsg: "PRESS SPACE TO SERVE<br><span style='font-size:16px;'>(Arrow Keys to move, Q to quit)</span>",
        scripts: {
          default: "What should I do? It is quiet here...\nThe gentle glow of the monitor is the only light.",
          intro: "It is late at night. The office is empty.\nA tired worker stares at the glowing screen.\nHe is not casting spells, nor slaying dragons...\n\nHe is just laying down simple blocks of code, one by one.\nAnd yet... in the vector space inside the machine,\nentire worlds are being built.",
          examine: "<span class='text-title'>[ Public Projects : The Architect's Desk ]</span><span class='text-item'>- <a href='https://github.com/redsunjin/maestro-coding' target='_blank' class='text-link'>maestro-coding</a> : AI Agents Code Symphony 🎼</span><span class='text-item'>- <a href='https://github.com/redsunjin/trunk_rag' target='_blank' class='text-link'>trunk_rag</a> : Local Network Lightweight RAG.</span><span class='text-item'>- <a href='https://github.com/redsunjin/OpenCourse-TTS-Helper' target='_blank' class='text-link'>OpenCourse-TTS-Helper</a> : Online Learning TTS Browser Extension.</span><br>These structures are small, but they hold the sky up.",
          open: "You slowly open the locked drawer. The mist of <span class='text-highlight'>Private Repositories</span> spills out.\nYou can barely make out shapes of future monoliths.\nHidden modules. Unreleased architectures.\n\n<span style='color:#777;'>Hint: Focus on the 'atlas' prefixes in the public domain.</span>\nThe drawer closes before you see too much.",
          play: "Wait... a strange program executes...",
          pongExit: "Game terminated. The man returns to coding."
        }
      },
      ko: {
        title: "기록의 조각들 (The Builder's Tale)",
        subTitle: '"코드 한 줄의 평범함이 비범한 세계를 빚어낸다."',
        btnIntro: "바라본다 (Intro)",
        btnExamine: "살펴본다 (Public)",
        btnOpen: "열어본다 (Private)",
        btnPlay: "즐긴다",
        pongMsg: "서브하려면 스페이스바를 누르세요<br><span style='font-size:16px;'>(방향키: 이동, Q: 종료)</span>",
        scripts: {
          default: "무엇을 해야 할까? 사방이 고요하다...\n오직 모니터의 희미한 불빛만이 공간을 채운다.",
          intro: "늦은 밤, 텅 빈 사무실.\n피곤에 지친 직장인이 빛나는 화면을 응시하고 있다.\n그는 마법을 부리거나 드래곤과 싸우지 않는다...\n\n그저 평범한 코드 블록들을 묵묵히 하나씩 쌓아 올릴 뿐이다.\n그러나... 기계 안의 벡터 스페이스에서는,\n어느새 거대한 세계가 지어지고 있다.",
          examine: "<span class='text-title'>[ Public Projects : 건축가의 책상 ]</span><span class='text-item'>- <a href='https://github.com/redsunjin/maestro-coding' target='_blank' class='text-link'>maestro-coding</a> : 코딩을 지휘하다 - AI 에이전트 심포니 🎼</span><span class='text-item'>- <a href='https://github.com/redsunjin/trunk_rag' target='_blank' class='text-link'>trunk_rag</a> : 폐쇄망/로컬 환경 경량 RAG.</span><span class='text-item'>- <a href='https://github.com/redsunjin/OpenCourse-TTS-Helper' target='_blank' class='text-link'>OpenCourse-TTS-Helper</a> : 온라인 학습 플랫폼 음성 보조 브라우저 확장.</span><br>이 구조물들은 작지만 든든하게 세상의 한 축을 지탱한다.",
          open: "잠겨 있던 서랍을 천천히 엽니다. <span class='text-highlight'>비공개 프로젝트(Private)</span>의 안개가 흘러나옵니다.\n거대한 모놀리스의 흐릿한 윤곽이 보입니다.\n숨겨진 모듈과 아직 형태를 갖추지 못한 아키텍처들.\n\n<span style='color:#777;'>힌트: 퍼블릭 목록의 'atlas' 접두어에 주목하십시오.</span>\n너무 많은 것을 보기 전에 서랍이 스르륵 닫혀 버립니다.",
          play: "잠깐... 알 수 없는 프로그램이 실행됩니다...",
          pongExit: "게임이 종료되었습니다. 남자는 다시 현실로 돌아가 코딩을 시작합니다."
        }
      }
    };

    let currLang = 'en';
    let currentAction = 'intro';

    const langToggleBtn = document.getElementById('lang-toggle');
    langToggleBtn.addEventListener('click', () => {
      currLang = (currLang === 'en') ? 'ko' : 'en';
      langToggleBtn.innerText = `LANG: ${currLang.toUpperCase()}`;
      updateUI();
      typeLine(i18n[currLang].scripts[currentAction]);
    });

    function updateUI() {
      document.getElementById('mainTitle').innerText = i18n[currLang].title;
      document.getElementById('subTitle').innerText = i18n[currLang].subTitle;
      document.getElementById('btn-intro').innerText = i18n[currLang].btnIntro;
      document.getElementById('btn-examine').innerText = i18n[currLang].btnExamine;
      document.getElementById('btn-open').innerText = i18n[currLang].btnOpen;
      document.getElementById('btn-play').innerText = i18n[currLang].btnPlay;
      document.getElementById('pong-msg').innerHTML = i18n[currLang].pongMsg;
    }

    // -------------------------------------------------------------------
    // ★ 퀄리티업 픽셀 코드 엔진 원복: 루카스아츠 스타일의 명암 및 볼류메트릭 라이팅
    // -------------------------------------------------------------------
    const sceneCanvas = document.getElementById('scene');
    const ctx = sceneCanvas.getContext('2d');
    const MathRand = Math.random;

    const stars = [];
    for (let i = 0; i < 40; i++) {
      stars.push({ x: 222 + MathRand() * 76, y: 22 + MathRand() * 76, speed: 0.05 + MathRand() * 0.1, phase: MathRand() * Math.PI * 2 });
    }

    // 입체감 있는 픽셀 드로잉 헬퍼
    function drawRect(x, y, w, h, color) { ctx.fillStyle = color; ctx.fillRect(x, y, w, h); }

    function drawScene(frame) {
      // 1. 역동적인 심도의 방 배경 (Volumetric Dark Purple/Blue)
      let bgGrad = ctx.createLinearGradient(0, 0, 0, 144);
      bgGrad.addColorStop(0, "#080c16");
      bgGrad.addColorStop(1, "#151828");
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, 320, 144);

      // 2. 배경 사물: 심도를 나타내는 서버 장비 랙
      drawRect(10, 20, 40, 110, "#0b0f1a"); // 베이스 랙
      drawRect(12, 22, 36, 108, "#05070d"); // 내부 패널
      // 서버 블록과 깜빡이는 LED
      for (let i = 0; i < 6; i++) {
        let sy = 30 + i * 16;
        drawRect(14, sy, 32, 10, "#111826"); // 랙 유닛
        drawRect(16, sy + 2, 28, 2, "#0a0f18"); // 통풍구 슬롯
        // 무작위 다이오드 깜빡임
        if ((frame + i * 17) % 30 < 15) drawRect(40, sy + 4, 2, 2, "#0f5"); // 통신 LED
        if ((frame + i * 7) % 50 < 10) drawRect(35, sy + 4, 2, 2, "#f22"); // HDD LED
      }

      // 우측 창문과 바깥 풍경 (깊이 추가)
      drawRect(218, 18, 84, 84, "#2a3441"); // 두꺼운 메탈 창틀
      drawRect(220, 20, 80, 80, "#030610"); // 창밖 밤하늘

      stars.forEach(s => {
        let alpha = (Math.sin(frame * s.speed + s.phase) + 1) / 2;
        drawRect(s.x, s.y, 1, 1, `rgba(180, 200, 255, ${alpha})`);
      });

      // 먼 빌딩 실루엣
      drawRect(230, 70, 15, 30, "#080d19");
      drawRect(250, 50, 20, 50, "#0a101f");
      drawRect(275, 60, 12, 40, "#060a12");
      if (frame % 60 < 30) drawRect(255, 60, 2, 2, "#fa0"); // 빌딩 불빛 1
      if (frame % 80 < 40) drawRect(260, 80, 2, 2, "#fa0"); // 빌딩 불빛 2

      // 책상: 명암과 라인 드로잉으로 질감 개선
      drawRect(0, 130, 320, 14, "#19110d"); // 베이스
      drawRect(0, 130, 320, 1, "#443125");  // 상판 밝은 테두리
      drawRect(30, 132, 180, 12, "#201611"); // 앞면 두꺼운 나무
      drawRect(30, 132, 180, 1, "#31231c"); // 모서리선 그림자
      drawRect(0, 140, 320, 4, "#040302");  // 책상 밑 칠흑 그림자

      // 모락모락 커피잔 명암 (Rim light)
      drawRect(180, 122, 10, 10, "#aab"); // 컵 몸통
      drawRect(180, 122, 2, 10, "#dde"); // 컵 왼쪽 하이라이트
      drawRect(190, 124, 2, 6, "#889");  // 손잡이 그늘
      drawRect(182, 122, 6, 2, "#210");  // 커피

      ctx.fillStyle = "rgba(180, 200, 255, 0.2)";
      let sX = 184 + Math.sin(frame * 0.1) * 2, sY = 118 - (frame % 20) * 0.5;
      if (frame % 40 < 25) ctx.fillRect(sX, sY, 3, 3);
      if (frame % 40 < 15) ctx.fillRect(sX + 1, sY - 4, 4, 4);

      // 의자 등받이 명암
      drawRect(90, 90, 12, 40, "#15181a");
      drawRect(100, 90, 2, 40, "#2a3036"); // 모니터 빛 하이라이트

      // ----------------------------------------------------
      // ★ 빛(Lighting) & 모니터 이펙트 (볼류메트릭 라이팅 극대화)
      // ----------------------------------------------------
      const monitorGlowStr = Math.floor((Math.sin(frame * 0.05) * 0.5 + 0.5) * 20);
      // 모니터 테두리
      drawRect(58, 38, 104, 74, "#678");
      drawRect(56, 36, 108, 2, "#89a"); // 상단 하이라이트

      // 모니터 내부 (그라데이션 방출)
      let mGrad = ctx.createLinearGradient(60, 40, 60, 110);
      mGrad.addColorStop(0, `rgb(10, ${80 + monitorGlowStr * 2}, ${60 + monitorGlowStr})`);
      mGrad.addColorStop(1, `rgb(5, ${30 + monitorGlowStr}, 20)`);
      drawRect(60, 40, 100, 70, mGrad);

      // 모니터 화면 주사선(텍스트 흉내) 애니메이션
      ctx.fillStyle = `rgba(100,255,150,${0.5 + monitorGlowStr / 100})`;
      if (frame % 10 > 2) drawRect(65, 45, 20, 2);
      if (frame % 10 > 4) drawRect(65, 52, 45, 2);
      drawRect(65, 65, 12 + (frame % 3) * 5, 2); // 치는중인 커서

      // 전방향 볼류메트릭 글로우 (모니터 불빛이 방을 비춤, 인디아나 존스의 부드러운 빛 효과)
      let lightGrad = ctx.createRadialGradient(110, 75, 10, 110, 75, 120);
      lightGrad.addColorStop(0, `rgba(50, 255, 120, ${0.15 + monitorGlowStr / 200})`);
      lightGrad.addColorStop(1, "rgba(50, 255, 120, 0)");
      ctx.globalCompositeOperation = "screen";
      ctx.fillStyle = lightGrad;
      ctx.beginPath(); ctx.arc(110, 75, 120, 0, Math.PI * 2); ctx.fill();
      ctx.globalCompositeOperation = "source-over"; // 복구

      // ----------------------------------------------------
      // 캐릭터 그림자 및 하이라이트 명암 묘사 (스프라이트 느낌)
      // ----------------------------------------------------
      // 머리(실루엣)
      drawRect(110, 68, 16, 18, "#252020");
      drawRect(110, 68, 4, 18, "#4a5b6c"); // 모니터 좌측 하이라이트

      // 헤드폰
      drawRect(108, 64, 20, 4, "#111");
      drawRect(106, 68, 4, 10, "#333"); drawRect(126, 68, 4, 10, "#0a0a0a");
      drawRect(106, 68, 1, 10, "#576a7e"); // 헤드폰 가장자리 하이라이트

      // 셔츠 몸통 (원근감 덩어리)
      drawRect(100, 86, 30, 44, "#2a3544"); // 기본 색
      drawRect(120, 86, 10, 44, "#18202b"); // 등쪽 진한 그림자
      drawRect(100, 86, 6, 44, "#456075");  // 앞가슴 모니터 빛 반사

      // 팔 및 타이핑하는 손가락 (정교화)
      drawRect(80, 106, 20, 8, "#324455"); // 팔뚝
      drawRect(80, 106, 20, 2, "#4a657c"); // 팔 윗면 빛

      // 동적 타이핑 (왼손)
      if (frame % 10 < 5) {
        drawRect(72, 108, 8, 4, "#d8a088"); // 손
        drawRect(72, 106, 2, 2, "#ffe0d0"); // 손등 하이라이트
      } else {
        drawRect(72, 114, 8, 4, "#d8a088");
        drawRect(72, 112, 2, 2, "#ffe0d0");
      }

      // 키보드 입체감
      drawRect(60, 126, 35, 4, "#333");
      drawRect(60, 126, 35, 1, "#666"); // 상단 엣지
      if (frame % 10 < 5) drawRect(65 + (frame % 15), 126, 2, 2, "#111"); // 자판 누르는 묘사
    }

    let sceneFrame = 0;
    setInterval(() => { drawScene(sceneFrame++); }, 80); // 조금 더 부드러운 프레임

    // -----------------------------------------------------
    // 타이핑 엔진 조작 (DOM)
    // -----------------------------------------------------
    const domText = document.getElementById('text-content');
    const verbs = document.querySelectorAll('.verb');
    let typeTimer = null, isPongActive = false;

    function typeLine(htmlStr) {
      if (typeTimer) clearInterval(typeTimer);
      domText.innerHTML = "";
      let i = 0, buffer = "";
      typeTimer = setInterval(() => {
        if (i >= htmlStr.length) { clearInterval(typeTimer); return; }
        if (htmlStr[i] === '<') {
          let tag = "";
          while (htmlStr[i] !== '>' && i < htmlStr.length) { tag += htmlStr[i]; i++; }
          tag += '>'; buffer += tag;
        } else {
          buffer += (htmlStr[i] === '\n') ? "<br>" : htmlStr[i];
          i++;
        }
        domText.innerHTML = buffer;
      }, 20);
    }

    verbs.forEach(v => {
      v.addEventListener('click', (e) => {
        if (isPongActive) return;
        const action = e.target.getAttribute('data-action');
        currentAction = action;
        verbs.forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');

        if (action === 'play') {
          typeLine(i18n[currLang].scripts.play); setTimeout(startPong, 1500);
        } else {
          typeLine(i18n[currLang].scripts[action]);
        }
      });
    });

    updateUI(); typeLine(i18n[currLang].scripts.intro);

    // -----------------------------------------------------
    // 핑퐁 미니게임
    // -----------------------------------------------------
    const pongCanvas = document.getElementById('pong');
    const pCtx = pongCanvas.getContext('2d');
    let pWidth = 320, pHeight = 144, paddleW = 4, paddleH = 24;
    let playerY = 60, aiY = 60, ballX = 160, ballY = 72, ballS = 2.5, ballDX = 0, ballDY = 0;
    let pScore = 0, aiScore = 0, pongLoop, state = 'WAIT';

    function drawPong() {
      pCtx.fillStyle = "rgba(0,30,0,0.95)"; pCtx.fillRect(0, 0, pWidth, pHeight);
      pCtx.fillStyle = "#fff";
      for (let i = 0; i < pHeight; i += 8) pCtx.fillRect(pWidth / 2 - 1, i, 2, 4);
      pCtx.font = "16px 'VT323'"; pCtx.fillText(pScore, pWidth / 4, 20); pCtx.fillText(aiScore, (pWidth / 4) * 3, 20);
      pCtx.fillRect(10, playerY, paddleW, paddleH);
      pCtx.fillRect(pWidth - 10 - paddleW, aiY, paddleW, paddleH);
      pCtx.fillRect(ballX, ballY, 4, 4);
    }

    function updatePong() {
      if (state !== 'PLAY') return;
      ballX += ballDX * ballS; ballY += ballDY * ballS;
      if (ballY <= 0 || ballY >= pHeight - 4) ballDY *= -1;
      if (ballX <= 10 + paddleW && ballY + 4 >= playerY && ballY <= playerY + paddleH && ballDX < 0) {
        ballDX *= -1.05; ballDY = (ballY - (playerY + paddleH / 2)) * 0.12;
      }
      if (ballX + 4 >= pWidth - 10 - paddleW && ballY + 4 >= aiY && ballY <= aiY + paddleH && ballDX > 0) {
        ballDX *= -1.05; ballDY = (ballY - (aiY + paddleH / 2)) * 0.12;
      }
      if (aiY + paddleH / 2 < ballY - 4) aiY += 1.3; else if (aiY + paddleH / 2 > ballY + 4) aiY -= 1.3;
      if (playerY < 0) playerY = 0; if (playerY > pHeight - paddleH) playerY = pHeight - paddleH;
      if (aiY < 0) aiY = 0; if (aiY > pHeight - paddleH) aiY = pHeight - paddleH;
      if (ballX < 0) { aiScore++; resetBall(); }
      if (ballX > pWidth) { pScore++; resetBall(); }
    }

    function resetBall() {
      ballX = pWidth / 2; ballY = pHeight / 2; state = 'WAIT';
      document.getElementById('pong-msg').style.display = 'block';
    }

    function runPong() {
      updatePong(); drawPong(); if (isPongActive) pongLoop = requestAnimationFrame(runPong);
    }

    function startPong() {
      isPongActive = true; pongCanvas.style.display = 'block'; document.getElementById('pong-msg').style.display = 'block';
      playerY = 60; aiY = 60; pScore = 0; aiScore = 0; ballS = 2.5;
      resetBall(); runPong();
    }

    window.addEventListener('keydown', (e) => {
      if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1) e.preventDefault();
      if (!isPongActive) return;
      if (state === 'WAIT' && e.code === 'Space') {
        state = 'PLAY'; document.getElementById('pong-msg').style.display = 'none';
        ballDX = Math.random() > 0.5 ? 1 : -1; ballDY = (Math.random() - 0.5) * 2;
      }
      if (e.code === 'ArrowUp') playerY -= 20; if (e.code === 'ArrowDown') playerY += 20;
      if (e.key === 'q' || e.key === 'Escape') {
        isPongActive = false; pongCanvas.style.display = 'none'; document.getElementById('pong-msg').style.display = 'none';
        cancelAnimationFrame(pongLoop); document.getElementById('btn-play').classList.remove('active');
        typeLine(i18n[currLang].scripts.pongExit);
      }
    });
  </script>
</body>
